<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blue Green Deployment</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    background:white;
    color:#222;
    width:430px;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}
.badge{
    padding:8px 18px;
    border-radius:20px;
    color:white;
    font-weight:bold;
    display:inline-block;
    margin-bottom:15px;
}
.blue{background:#007bff;}
.green{background:#28a745;}
h1{margin:10px 0;}
p{color:#555;}
</style>
</head>
<body>

<div class="card">
<div class="badge {{ env|lower }}">{{ env }} ENV</div>

<h1>🚀 Blue Green CI/CD</h1>

<h2>Version {{ version }}</h2>

<p>Updated: {{ updated }}</p>

<p>Jenkins + Docker + Kubernetes</p>
</div>

</body>
</html>
