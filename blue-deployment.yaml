apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp
      version: blue

  template:
    metadata:
      labels:
        app: myapp
        version: blue

    spec:
      containers:
        - name: blue-app
          image: bluegreen-app:1
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: BLUE
            - name: APP_VERSION
              value: "1.0"